<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איקס עיגול עם פריאל</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff9f0 0%, #fde8d8 50%, #ffd6e7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      direction: rtl;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .bg-fruit {
      position: absolute;
      opacity: 0.12;
      pointer-events: none;
      user-select: none;
    }

    .title-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .title-emoji { font-size: 2.8rem; margin-bottom: 4px; }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #c0392b;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(192,57,43,0.15);
    }

    .scoreboard {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      background: white;
      border-radius: 20px;
      padding: 14px 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 2px solid #fce4ec;
    }
    .score-player { text-align: center; min-width: 60px; }
    .score-fruit { font-size: 1.8rem; }
    .score-num { font-size: 1.6rem; font-weight: 800; line-height: 1; }
    .score-label { font-size: 0.7rem; color: #aaa; margin-top: 2px; }

    .status {
      margin-bottom: 20px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-pill {
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      color: #555;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border: 2px solid #f0f0f0;
    }
    .status-pill .big { font-size: 1.4rem; }
    .status-winner {
      color: white;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 1.15rem;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: pop 0.4s cubic-bezier(.36,2,.4,.8);
    }
    .winner-x { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .winner-o { background: linear-gradient(135deg, #f39c12, #e67e22); }
    .winner-draw { background: linear-gradient(135deg, #8e44ad, #6c3483); }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      background: white;
      padding: 16px;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      border: 2px solid #fce4ec;
      margin-bottom: 24px;
    }
    .cell {
      width: 88px;
      height: 88px;
      border-radius: 16px;
      border: 2px solid #f0dde0;
      background: white;
      font-size: 2.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .cell:hover:not(.taken):not(.done) {
      background: #fff5f5;
      transform: scale(1.04);
    }
    .cell.taken { background: #fafafa; box-shadow: inset 0 1px 4px rgba(0,0,0,0.06); cursor: default; }
    .cell.win-x { border: 3px solid #e74c3c; background: #fff0ef; box-shadow: 0 0 18px rgba(231,76,60,0.3); transform: scale(1.06); }
    .cell.win-o { border: 3px solid #f39c12; background: #fff8ef; box-shadow: 0 0 18px rgba(243,156,18,0.3); transform: scale(1.06); }

    .reset-btn {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 13px 36px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(192,57,43,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.03em;
      font-family: inherit;
    }
    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(192,57,43,0.4);
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Background fruits -->
  <script>
    const bgFruits = ["🍇","🍊","🍏","🍑","🫐","🍍","🥭","🍒"];
    const tops    = [5,15,70,80,10,85,40,60];
    const lefts   = [5,88,3,90,45,50,80,10];
    const sizes   = [1.5,2.3,1.5,2.3,1.5,2.3,1.5,2.3];
    bgFruits.forEach((f, i) => {
      const el = document.createElement('div');
      el.className = 'bg-fruit';
      el.textContent = f;
      el.style.cssText = `font-size:${sizes[i]}rem;top:${tops[i]}%;left:${lefts[i]}%;transform:rotate(${i*45}deg)`;
      document.body.appendChild(el);
    });
  </script>

  <div class="title-area">
    <div class="title-emoji">🍓 X 🍋</div>
    <h1>איקס עיגול עם פריאל</h1>
  </div>

  <div class="scoreboard">
    <div class="score-player">
      <div class="score-fruit">🍓</div>
      <div class="score-num" id="score-x" style="color:#e74c3c">0</div>
      <div class="score-label">ניקוד</div>
    </div>
    <div class="score-player">
      <div class="score-fruit">🍋</div>
      <div class="score-num" id="score-o" style="color:#f39c12">0</div>
      <div class="score-label">ניקוד</div>
    </div>
  </div>

  <div class="status" id="status">
    <div class="status-pill">תור של: <span class="big">🍓</span></div>
  </div>

  <div class="board" id="board"></div>

  <button class="reset-btn" onclick="resetGame()">🔄 משחק חדש</button>

  <script>
    const FRUIT = { X: '🍓', O: '🍋' };
    const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board = Array(9).fill(null);
    let isX = true;
    let scores = { X: 0, O: 0 };
    let gameOver = false;

    function checkWinner(b) {
      for (const [a,c,d] of LINES) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a,c,d] };
      }
      return null;
    }

    function renderBoard(winLine = []) {
      const el = document.getElementById('board');
      el.innerHTML = '';
      board.forEach((cell, i) => {
        const btn = document.createElement('button');
        btn.className = 'cell' + (cell ? ' taken' : '') + (gameOver ? ' done' : '');
        if (winLine.includes(i)) btn.classList.add(cell === 'X' ? 'win-x' : 'win-o');
        btn.textContent = cell ? FRUIT[cell] : '';
        btn.onclick = () => handleClick(i);
        el.appendChild(btn);
      });
    }

    function renderStatus(result, isDraw) {
      const el = document.getElementById('status');
      if (result) {
        const fruit = FRUIT[result.winner];
        el.innerHTML = `<div class="status-winner ${result.winner === 'X' ? 'winner-x' : 'winner-o'}">${fruit} ניצח! 🎉</div>`;
      } else if (isDraw) {
        el.innerHTML = `<div class="status-winner winner-draw">🤝 תיקו!</div>`;
      } else {
        el.innerHTML = `<div class="status-pill">תור של: <span class="big">${FRUIT[isX ? 'X' : 'O']}</span></div>`;
      }
    }

    function handleClick(i) {
      if (board[i] || gameOver) return;
      board[i] = isX ? 'X' : 'O';
      const result = checkWinner(board);
      const isDraw = !result && board.every(Boolean);
      if (result) {
        scores[result.winner]++;
        document.getElementById('score-x').textContent = scores.X;
        document.getElementById('score-o').textContent = scores.O;
        gameOver = true;
        renderBoard(result.line);
        renderStatus(result, false);
      } else if (isDraw) {
        gameOver = true;
        renderBoard();
        renderStatus(null, true);
      } else {
        isX = !isX;
        renderBoard();
        renderStatus(null, false);
      }
    }

    function resetGame() {
      board = Array(9).fill(null);
      isX = true;
      gameOver = false;
      renderBoard();
      renderStatus(null, false);
    }

    renderBoard();
    renderStatus(null, false);
  </script>
</body>
</html>
